<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>С Днём Рождения, мама!</title>
  <style>
    :root{
      --bg1:#fff1f6;
      --bg2:#f3f7ff;
      --card:#ffffffcc;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#ff4d8d;
      --accent2:#6d5efc;
      --shadow: 0 10px 35px rgba(0,0,0,.12);
      --radius: 20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(1200px 600px at 20% 10%, var(--bg1), transparent 60%),
                  radial-gradient(1000px 700px at 80% 20%, var(--bg2), transparent 60%),
                  linear-gradient(180deg, #ffffff, #f8fafc);
      min-height:100vh;
      overflow-x:hidden;
    }
    header{
      padding:14px 12px 6px;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(980px, 92vw);
      margin: 0 auto 28px;
    }
    .topbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
      padding:8px;
      background:var(--card);
      backdrop-filter: blur(8px);
      border-radius:999px;
      box-shadow: var(--shadow);
      border:1px solid rgba(0,0,0,.06);
    }
    .tabbtn{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      font-weight:650;
      color:var(--text);
      background:transparent;
      transition:.2s;
      font-size: 14px;
    }
    .tabbtn:hover{ transform: translateY(-1px); }
    .tabbtn.active{
      background: linear-gradient(90deg, var(--accent), #ff8ab8);
      color:white;
      box-shadow: 0 8px 18px rgba(255,77,141,.25);
    }

    .card{
      margin-top:14px;
      background:var(--card);
      border:1px solid rgba(0,0,0,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel{
      display:none;
      padding:18px 16px 22px;
    }
    .panel.active{ display:block; }

    .hero{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:18px;
      align-items:center;
    }
    .title{
      font-size: clamp(26px, 3vw, 40px);
      line-height:1.05;
      margin:0 0 10px;
      letter-spacing:-.02em;
    }
    .subtitle{
      margin:0 0 14px;
      color:var(--muted);
      font-size: 15.5px;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      border:none;
      cursor:pointer;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight:750;
      background: linear-gradient(90deg, var(--accent2), #9a7bff);
      color:white;
      box-shadow: 0 10px 20px rgba(109,94,252,.25);
      transition:.2s;
      font-size: 14px;
    }
    .btn:hover{ transform: translateY(-1px); }
    .btn.secondary{
      background: white;
      color: var(--text);
      border: 1px solid rgba(0,0,0,.12);
      box-shadow:none;
    }

    .scene{
      position:relative;
      height: 360px;
      border-radius: 16px;
      background:
        radial-gradient(600px 240px at 50% 80%, rgba(255,77,141,.18), transparent 60%),
        radial-gradient(500px 220px at 30% 20%, rgba(109,94,252,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.55));
      border: 1px solid rgba(0,0,0,.06);
      overflow:hidden;
    }

    .cake{
      position:absolute;
      left:50%;
      bottom:36px;
      transform: translateX(-50%);
      width: 240px;
      height: 180px;
    }
    .plate{
      position:absolute;
      left:50%;
      bottom:-6px;
      transform: translateX(-50%);
      width: 280px;
      height: 26px;
      background: linear-gradient(180deg, #f2f2f2, #e4e7ec);
      border-radius: 999px;
      box-shadow: 0 10px 22px rgba(0,0,0,.15);
    }
    .layer{
      position:absolute;
      left:50%;
      transform: translateX(-50%);
      width: 240px;
      height: 110px;
      bottom: 16px;
      background: linear-gradient(180deg, #ffe0ea, #ffd0df);
      border-radius: 20px 20px 18px 18px;
      box-shadow: 0 14px 28px rgba(0,0,0,.12);
      border: 1px solid rgba(0,0,0,.06);
    }
    .icing{
      position:absolute;
      left:50%;
      transform: translateX(-50%);
      width: 246px;
      height: 56px;
      bottom: 88px;
      background: linear-gradient(180deg, #fff, #fff6fb);
      border-radius: 22px 22px 26px 26px;
      border: 1px solid rgba(0,0,0,.05);
      overflow:hidden;
    }
    .drip{
      position:absolute;
      bottom:-18px;
      width: 28px;
      height: 34px;
      background: linear-gradient(180deg, #fff, #fff6fb);
      border-radius: 999px;
      opacity:.98;
    }
    .drip:nth-child(1){ left:16px; height:30px; }
    .drip:nth-child(2){ left:54px; height:38px; }
    .drip:nth-child(3){ left:96px; height:28px; }
    .drip:nth-child(4){ left:132px; height:42px; }
    .drip:nth-child(5){ left:174px; height:30px; }
    .drip:nth-child(6){ left:208px; height:36px; }

    .candle{
      position:absolute;
      top:-60px;
      width: 14px;
      height: 52px;
      border-radius: 8px;
      background: repeating-linear-gradient(45deg,#ffd1e1 0 6px,#ffffff 6px 12px);
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
      transform: translateX(-50%);
      pointer-events:none;
      z-index: 3;
    }
    .wick{
      position:absolute;
      top:-7px;
      left:50%;
      transform:translateX(-50%);
      width: 2px;
      height: 8px;
      background: #3b3b3b;
      border-radius: 2px;
    }
    .flame{
      position:absolute;
      top:-24px;
      left:50%;
      transform:translateX(-50%);
      width: 14px;
      height: 18px;
      background: radial-gradient(circle at 40% 35%, #fff7c2, #ffb703 55%, #ff6a00 85%);
      border-radius: 10px 10px 10px 10px;
      filter: drop-shadow(0 6px 10px rgba(255,166,0,.35));
      opacity:0;
    }
    .candle.lit .flame{
      opacity:1;
      animation: flicker .14s infinite alternate;
    }
    @keyframes flicker{
      from{ transform: translateX(-50%) scale(1) rotate(-2deg); }
      to{ transform: translateX(-50%) scale(1.04) rotate(2deg); }
    }

    .bigmsg{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding: 18px;
      text-align:center;
      pointer-events:none;
      opacity:0;
      transform: translateY(12px);
      transition: .8s ease;
      z-index: 4;
    }
    .bigmsg.show{ opacity:1; transform: translateY(0); }
    .bigmsg h2{
      margin-top: 10px;
      margin-bottom: 0;
      font-size: clamp(12px, 3vw, 20px);
      line-height:1.05;
      color:#111827;
      text-shadow: 0 10px 30px rgba(0,0,0,.10);
    }
    .bigmsg .spark{
      display:inline-block;
      margin-left:8px;
      animation: pop 1.2s ease-in-out infinite;
    }
    @keyframes pop{
      0%,100%{ transform: translateY(0) rotate(0deg); }
      50%{ transform: translateY(-4px) rotate(6deg); }
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
      margin-top:10px;
    }
    @media (max-width: 820px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px){ .grid{ grid-template-columns: 1fr; } }
    .ph{
      position:relative;
      border-radius: 16px;
      overflow:hidden;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, rgba(255,77,141,.22), rgba(109,94,252,.18));
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 10px 24px rgba(0,0,0,.10);
    }
    .ph img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .hint{
      color:var(--muted);
      font-size:14px;
      margin: 0;
    }

    .cassetteWrap{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      align-items:center;
    }
    @media (max-width: 820px){ .cassetteWrap{ grid-template-columns: 1fr; } }

    .cassette{
      width:min(420px, 100%);
      aspect-ratio: 16/10;
      margin: 0 auto;
      border-radius: 18px;
      background: linear-gradient(180deg, #2b2f36, #1e2228);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      position:relative;
      overflow:hidden;
    }
    .cassette:before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.08);
    }
    .label{
      position:absolute;
      left:18px;
      right:18px;
      top:18px;
      height: 34%;
      border-radius: 12px;
      background: linear-gradient(90deg, rgba(255,77,141,.25), rgba(109,94,252,.22));
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 10px;
      text-align:center;
      font-weight:800;
      letter-spacing:.02em;
      color: rgba(255,255,255,.92);
      z-index:2;
    }
    .window{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      height: 44%;
      border-radius: 12px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.10);
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-around;
      padding: 12px 16px;
      gap:14px;
    }
    .reel{
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.18) 0 18px, transparent 19px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08) 0 42px, transparent 43px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.12) 0 46px, transparent 47px);
      border: 1px solid rgba(255,255,255,.16);
      position:relative;
      overflow:hidden;
    }
    .reel:after{
      content:"";
      position:absolute;
      inset:-20px;
      background: conic-gradient(from 0deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.02),
        rgba(255,255,255,.10),
        rgba(255,255,255,.02));
      opacity:.9;
    }
    .reel.spin:after{ animation: spin 1.2s linear infinite; }
    @keyframes spin{ to{ transform: rotate(360deg); } }
    .tape{
      flex:1;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.08);
    }
    .cassetteBtn{
      position:absolute;
      right:16px;
      top: 54%;
      transform: translateY(-50%);
      z-index:3;
      border:none;
      cursor:pointer;
      border-radius: 14px;
      padding: 10px 12px;
      font-weight:900;
      color:#0b1220;
      background: linear-gradient(90deg, #ffd1e1, #ffffff);
      box-shadow: 0 12px 22px rgba(0,0,0,.20);
      display:flex;
      gap:10px;
      align-items:center;
    }
    .cassetteBtn:active{ transform: translateY(-50%) scale(.98); }
    .status{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .small{
      font-size: 13px;
      color: var(--muted);
      margin: 10px 0 0;
    }

    .confettiDot{
      position:absolute;
      width:10px;height:10px;
      border-radius:50%;
      opacity:.9;
      filter: blur(.1px);
      pointer-events:none;
      z-index: 5;
    }

    /* ===== Мобильная адаптация ===== */
    @media (max-width: 820px){
      .hero{ grid-template-columns: 1fr; }
      .scene{ height: 340px; }
    }
    @media (max-width: 520px){
      .wrap{ width: min(980px, 94vw); margin-bottom: 22px; }
      .panel{ padding: 14px 12px 18px; }
      .topbar{ padding: 8px; gap: 6px; }
      .tabbtn{ padding: 9px 12px; font-size: 13px; }
      .title{ font-size: 28px; }
      .subtitle{ font-size: 14px; }
      .btn{ padding: 10px 12px; font-size: 13px; }
      .scene{ height: 320px; }

      /* уменьшаем тортик на телефоне */
      .cake{ width: 210px; height: 160px; bottom: 34px; }
      .layer{ width: 210px; height: 102px; }
      .icing{ width: 216px; height: 52px; bottom: 84px; }
      .plate{ width: 250px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar" role="tablist" aria-label="Вкладки">
        <button class="tabbtn active" data-tab="card" role="tab" aria-selected="true">Открытка</button>
        <button class="tabbtn" data-tab="gallery" role="tab" aria-selected="false">Галерея</button>
        <button class="tabbtn" data-tab="cassette" role="tab" aria-selected="false">Кассета</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="panel active" id="tab-card" role="tabpanel">
        <div class="hero">
          <div>
            <h1 class="title">Мамочка, это для тебя 💗</h1>
            <p class="subtitle">
              Спасибо большое за все✨
            </p>
            <div class="actions">
              <button class="btn" id="startAnim">Запустить анимацию</button>
              <button class="btn secondary" id="resetAnim">Сбросить</button>
            </div>
          </div>

          <div class="scene" id="scene">
            <div class="bigmsg" id="bigmsg">
              <h2 id="msgText">С днём рождения, мама! <span class="spark">✨</span></h2>
            </div>

            <div class="cake" aria-label="Торт">
              <div class="plate"></div>
              <div class="layer"></div>
              <div class="icing" id="icing">
                <div class="drip"></div><div class="drip"></div><div class="drip"></div>
                <div class="drip"></div><div class="drip"></div><div class="drip"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="tab-gallery" role="tabpanel">
        <h2 style="margin:0 0 8px;">Галерея 📸</h2>
        <div class="grid" id="galleryGrid"></div>
      </div>

      <div class="panel" id="tab-cassette" role="tabpanel">
        <div class="cassetteWrap">
          <div>
            <h2 style="margin:0 0 8px;">Кассета с поздравлением 🎧</h2>
            <p class="status" id="audioStatus">Статус: ждёт нажатия ▶</p>
          </div>

          <div class="cassette" aria-label="Кассета">
            <div class="label">Для мамы 💗</div>

            <button class="cassetteBtn" id="cassetteBtn" title="Play/Pause">
              <span id="btnIcon">▶</span>
              <span id="btnText">Play</span>
            </button>

            <div class="window">
              <div class="reel" id="reelL"></div>
              <div class="tape"></div>
              <div class="reel" id="reelR"></div>
            </div>
          </div>

          <audio id="audio" preload="auto">
            <source src="audio.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>
    </section>
  </main>

  <script>
    const HAPPY_TEXT = "С днём рождения, мама!";
    const CANDLES_COUNT = 7;
    const FALL_TIME_MS = 850;
    const BETWEEN_MS = 120;
    const GALLERY = [
      "photos/IMG-20231014-WA0015.jpg",
      "photos/WhatsApp Image 2026-03-01 at 23.16.22.jpeg",
      "photos/WhatsApp Image 2026-03-01 at 23.28.44.jpeg",
      "photos/WhatsApp Image 2026-03-01 at 23.44.45.jpeg",
      "photos/WhatsApp Image 2026-03-01 at 23.46.38.jpeg",
      "photos/WhatsApp Image 2026-03-01 at 23.47.02.jpeg",
    ];

    const tabButtons = document.querySelectorAll(".tabbtn");
    const panels = {
      card: document.getElementById("tab-card"),
      gallery: document.getElementById("tab-gallery"),
      cassette: document.getElementById("tab-cassette"),
    };

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        tabButtons.forEach(b => b.setAttribute("aria-selected", b === btn ? "true" : "false"));

        const t = btn.dataset.tab;
        Object.values(panels).forEach(p => p.classList.remove("active"));
        panels[t].classList.add("active");
      });
    });

    const grid = document.getElementById("galleryGrid");
    function renderGallery(){
      grid.innerHTML = "";
      if (GALLERY.length === 0){
        for (let i=0;i<6;i++){
          const d = document.createElement("div");
          d.className = "ph";
          d.title = "Здесь будет фото";
          grid.appendChild(d);
        }
        return;
      }
      GALLERY.forEach(src => {
        const d = document.createElement("div");
        d.className = "ph";
        const img = document.createElement("img");
        img.src = src;
        img.alt = "Фото";
        img.loading = "lazy";
        d.appendChild(img);
        grid.appendChild(d);
      });
    }
    renderGallery();

    const scene = document.getElementById("scene");
    const bigmsg = document.getElementById("bigmsg");
    const msgText = document.getElementById("msgText");
    msgText.textContent = HAPPY_TEXT + " ✨";

    const startBtn = document.getElementById("startAnim");
    const resetBtn = document.getElementById("resetAnim");

    let running = false;
    let candleEls = [];

    function rand(min, max){ return Math.random() * (max - min) + min; }

    function clearCandles(){
      candleEls.forEach(el => el.remove());
      candleEls = [];
    }

    function resetAll(){
      running = false;
      clearCandles();
      bigmsg.classList.remove("show");
      scene.querySelectorAll(".confettiDot").forEach(x => x.remove());
    }

    // Ставим свечи выше: на белую глазурь, ближе к верхней кромке
    function getLandingY(){
      const icing = document.getElementById("icing");
      if (!icing) return Math.round(scene.clientHeight * 0.34);

      const s = scene.getBoundingClientRect();
      const i = icing.getBoundingClientRect();
      const topInScene = i.top - s.top;

      // Было +2. Делаем ещё выше: +1 (почти у верхней кромки глазури)
      return Math.round(topInScene -45 );
    }

    function makeCandle(x){
      const c = document.createElement("div");
      c.className = "candle";
      c.style.left = x + "px";

      const wick = document.createElement("div");
      wick.className = "wick";
      const flame = document.createElement("div");
      flame.className = "flame";
      c.appendChild(wick);
      c.appendChild(flame);

      scene.appendChild(c);
      candleEls.push(c);
      return c;
    }

    function animateCandleFall(candle, targetY, ms){
      return new Promise(resolve => {
        const start = performance.now();
        const startY = -60;
        const wobble = rand(-6, 6);

        function tick(now){
          const t = Math.min(1, (now - start) / ms);
          const ease = 1 - Math.pow(1 - t, 3);
          const y = startY + (targetY - startY) * ease;

          candle.style.top = y + "px";
          candle.style.transform = `translateX(-50%) rotate(${wobble * (1 - t)}deg)`;

          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        }
        requestAnimationFrame(tick);
      });
    }

    function confettiBurst(){
      const n = 36;
      const rect = scene.getBoundingClientRect();
      for (let i=0;i<n;i++){
        const dot = document.createElement("div");
        dot.className = "confettiDot";
        dot.style.left = rand(0, rect.width) + "px";
        dot.style.top = rand(0, rect.height * 0.35) + "px";
        dot.style.background = `hsl(${Math.floor(rand(0,360))} 90% 70%)`;
        scene.appendChild(dot);

        const dx = rand(-160, 160);
        const dy = rand(120, 280);
        const rot = rand(-180, 180);
        const dur = rand(900, 1400);

        dot.animate([
          { transform: "translate(0,0) rotate(0deg)", opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }
        ], { duration: dur, easing: "cubic-bezier(.2,.8,.2,1)", fill:"forwards" });
      }
    }

    async function startAnimation(){
      if (running) return;
      running = true;
      resetAll();

      const landY = getLandingY();

      const icing = document.getElementById("icing");
      const s = scene.getBoundingClientRect();
      const i = icing ? icing.getBoundingClientRect() : null;

      const centerX = i ? (i.left - s.left + i.width / 2) : (scene.clientWidth / 2);

      // На мобиле сделаем чуть уже, чтобы свечи точно не залезали за края
      const isMobile = window.matchMedia("(max-width: 520px)").matches;
      const usable = i ? Math.min(isMobile ? 150 : 190, i.width * (isMobile ? 0.64 : 0.74)) : (isMobile ? 140 : 170);

      const positions = [];
      if (CANDLES_COUNT === 1){
        positions.push(centerX);
      } else {
        const startX = centerX - usable / 2;
        const step = usable / (CANDLES_COUNT - 1);
        for (let k = 0; k < CANDLES_COUNT; k++){
          positions.push(startX + step * k);
        }
      }

      for (let idx = 0; idx < CANDLES_COUNT; idx++){
        const x = positions[idx];
        const candle = makeCandle(x);
        await animateCandleFall(candle, landY, FALL_TIME_MS);
        candle.classList.add("lit");
        await new Promise(r => setTimeout(r, BETWEEN_MS));
      }

      confettiBurst();
      bigmsg.classList.add("show");
      running = false;
    }

    startBtn.addEventListener("click", startAnimation);
    resetBtn.addEventListener("click", resetAll);

    const audio = document.getElementById("audio");
    const cassetteBtn = document.getElementById("cassetteBtn");
    const btnIcon = document.getElementById("btnIcon");
    const btnText = document.getElementById("btnText");
    const status = document.getElementById("audioStatus");
    const reelL = document.getElementById("reelL");
    const reelR = document.getElementById("reelR");

    function setPlayingUI(isPlaying){
      if (isPlaying){
        btnIcon.textContent = "⏸";
        btnText.textContent = "Pause";
        status.textContent = "Статус: играет 🎶";
        reelL.classList.add("spin");
        reelR.classList.add("spin");
      } else {
        btnIcon.textContent = "▶";
        btnText.textContent = "Play";
        status.textContent = "Статус: пауза";
        reelL.classList.remove("spin");
        reelR.classList.remove("spin");
      }
    }

    cassetteBtn.addEventListener("click", async () => {
      try{
        if (audio.paused){
          await audio.play();
          setPlayingUI(true);
        } else {
          audio.pause();
          setPlayingUI(false);
        }
      } catch(e){
        status.textContent = "Статус: не удалось включить (проверь audio.mp3 рядом с файлом)";
        setPlayingUI(false);
      }
    });

    audio.addEventListener("ended", () => {
      status.textContent = "Статус: закончило играть ✅";
      setPlayingUI(false);
    });

    setPlayingUI(false);
  </script>
</body>
</html>
